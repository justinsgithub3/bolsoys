<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsoy's</title>
</head>
<body>
    <header class="header">
        <h1 class="title">Upload Drawing</h1>
        <div class="buttons">
            <a id="main-anchor" href="/displays/">Go to Gallery</a>
        </div>
    </header>
    <div class="main-content">
        <form class="post-form" method="POST" enctype="multipart/form-data" action="/api/drawingss">
            <label for="form-drawing" class="camera-label">
            <span id="button-text">Open Files</span>
            <input class="camera" id="form-drawing" type="file" name="form-drawing" 
                    accept="image/*" capture="user" style="display: none;"/>
            </label>
        </form>
    </div>

    <script type="module" src="/assets/js/uploadJs.js"></script>
</body>
</html>
